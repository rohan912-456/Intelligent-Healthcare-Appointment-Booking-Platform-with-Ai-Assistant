name: MedApp CD — Deploy

on:
  push:
    branches: [main]

# ── Required for pushing to GitHub Container Registry ──
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medapp:latest
            ghcr.io/${{ github.repository_owner }}/medapp:${{ github.sha }}

      - name: Deployment summary
        run: |
          echo "✅ Docker image pushed to:"
          echo "   ghcr.io/${{ github.repository_owner }}/medapp:latest"
          echo ""
          echo "Pull and run on your server:"
          echo "   docker pull ghcr.io/${{ github.repository_owner }}/medapp:latest"
          echo "   docker-compose up -d"
